name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Sync dependencies
        run: uv sync

      - name: Run quality gate (just check)
        run: just check
